services:
  postgres:
    image: postgres:16-alpine
    container_name: labhaus-postgres
    environment:
      POSTGRES_DB: labhaus
      POSTGRES_USER: labhaus
      POSTGRES_PASSWORD: labhaus_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labhaus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: labhaus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: labhaus-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labhaus-api
    environment:
      LABHAUS_SERVER_PORT: "8080"
      LABHAUS_SERVER_ENVIRONMENT: "development"
      LABHAUS_DATABASE_HOST: postgres
      LABHAUS_DATABASE_PORT: "5432"
      LABHAUS_DATABASE_USER: labhaus
      LABHAUS_DATABASE_PASSWORD: labhaus_dev_password
      LABHAUS_DATABASE_DBNAME: labhaus
      LABHAUS_DATABASE_SSLMODE: disable
      LABHAUS_REDIS_HOST: redis
      LABHAUS_REDIS_PORT: "6379"
      LABHAUS_LOG_LEVEL: "debug"
      LABHAUS_LOG_FORMAT: "console"
      LABHAUS_JWT_SECRET_KEY: "dev-secret-key-change-in-production"
      LABHAUS_JWT_TOKEN_DURATION: "24"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: labhaus-network
